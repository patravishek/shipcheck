name: Marketing Agent

on:
  # Weekly security tip — every Monday at 9am IST (3:30am UTC)
  schedule:
    - cron: '30 3 * * 1'

  # Manual trigger — for release announcements or on-demand posts
  workflow_dispatch:
    inputs:
      type:
        description: 'Post type'
        required: true
        default: tip
        type: choice
        options:
          - tip
          - release
      version:
        description: 'Version (for release posts only, e.g. 0.1.4)'
        required: false
        default: ''
      topic:
        description: 'Security topic (for tip posts, leave blank to auto-rotate)'
        required: false
        default: ''
      schedule_time:
        description: 'ISO 8601 schedule time (e.g. 2026-05-28T09:00:00+05:30). Blank = 1 hour from now'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tsx
        run: npm install -g tsx

      - name: Install agent dependencies
        run: npm install --prefix scripts/marketing-agent @anthropic-ai/sdk

      - name: Run marketing agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_LINKEDIN_ID: ${{ secrets.BUFFER_LINKEDIN_ID }}
          BUFFER_TWITTER_ID: ${{ secrets.BUFFER_TWITTER_ID }}
          BUFFER_SCHEDULE_TIME: ${{ inputs.schedule_time }}
        run: |
          ARGS="--type ${{ inputs.type || 'tip' }}"
          if [ -n "${{ inputs.version }}" ]; then ARGS="$ARGS --version ${{ inputs.version }}"; fi
          if [ -n "${{ inputs.topic }}" ];   then ARGS="$ARGS --topic ${{ inputs.topic }}"; fi
          tsx scripts/marketing-agent/agent.ts $ARGS
